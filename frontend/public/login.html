<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول - Sentiment Arabia</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
  * { font-family: 'Cairo', sans-serif; }
  .hero { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f4c75 100%); }
  .input-field { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; }
  .input-field:focus { background: rgba(255,255,255,0.12); border-color: #3b82f6; outline: none; }
  .input-field::placeholder { color: rgba(255,255,255,0.4); }
  .tab-btn { transition: all 0.3s; }
  .tab-active { background: #3b82f6; color: white; }
</style>
</head>
<body class="hero min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl font-black text-white mx-auto mb-4 shadow-2xl">S</div>
    <h1 class="text-3xl font-black text-white">Sentiment Arabia</h1>
    <p class="text-slate-400 text-sm mt-1">منصة تحليل المشاعر العربية</p>
  </div>

  <!-- Card -->
  <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-7 shadow-2xl">
    <!-- Tabs -->
    <div class="flex bg-white/10 rounded-xl p-1 mb-6">
      <button onclick="switchTab('login')" id="tab-login"
        class="tab-btn tab-active flex-1 py-2 rounded-lg text-sm font-medium">
        <i class="fas fa-sign-in-alt ml-1"></i>دخول
      </button>
      <button onclick="switchTab('register')" id="tab-register"
        class="tab-btn flex-1 py-2 rounded-lg text-sm font-medium text-white/70">
        <i class="fas fa-user-plus ml-1"></i>تسجيل جديد
      </button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="space-y-4">
        <div>
          <label class="text-white/70 text-sm mb-1.5 block">البريد الإلكتروني</label>
          <input id="loginEmail" type="email" placeholder="admin@noon_sa.com"
            class="input-field w-full rounded-xl px-4 py-3">
        </div>
        <div>
          <label class="text-white/70 text-sm mb-1.5 block">كلمة المرور</label>
          <input id="loginPass" type="password" placeholder="••••••••"
            class="input-field w-full rounded-xl px-4 py-3"
            onkeypress="if(event.key==='Enter')doLogin()">
        </div>
        <div id="loginError" class="hidden text-red-400 text-sm text-center py-2 bg-red-500/10 rounded-lg"></div>
        <button onclick="doLogin()" id="loginBtn"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-3.5 font-bold text-base transition shadow-lg">
          <i class="fas fa-sign-in-alt ml-2"></i>دخول
        </button>
      </div>

      <!-- Demo accounts -->
      <div class="mt-6 pt-4 border-t border-white/10">
        <p class="text-white/50 text-xs text-center mb-3">حسابات تجريبية جاهزة</p>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="fillDemo('admin@noon_sa.com','noon2024')" class="bg-white/10 hover:bg-white/20 text-white rounded-lg py-2 text-xs transition border border-white/10">🛍️ نون</button>
          <button onclick="fillDemo('admin@amazon_sa.com','amazon2024')" class="bg-white/10 hover:bg-white/20 text-white rounded-lg py-2 text-xs transition border border-white/10">📦 أمازون</button>
          <button onclick="fillDemo('admin@jarir.com','jarir2024')" class="bg-white/10 hover:bg-white/20 text-white rounded-lg py-2 text-xs transition border border-white/10">📚 جرير</button>
          <button onclick="fillDemo('admin@extra_sa.com','extra2024')" class="bg-white/10 hover:bg-white/20 text-white rounded-lg py-2 text-xs transition border border-white/10">📺 إكسترا</button>
        </div>
      </div>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-white/70 text-xs mb-1 block">معرف الشركة *</label>
            <input id="regId" placeholder="my_company" class="input-field w-full rounded-xl px-3 py-2.5 text-sm">
          </div>
          <div>
            <label class="text-white/70 text-xs mb-1 block">اسم الشركة *</label>
            <input id="regName" placeholder="شركتي" class="input-field w-full rounded-xl px-3 py-2.5 text-sm">
          </div>
        </div>
        <div>
          <label class="text-white/70 text-xs mb-1 block">قطاع الأعمال *</label>
          <select id="regIndustry" class="input-field w-full rounded-xl px-3 py-2.5 text-sm">
            <option value="تجارة إلكترونية">تجارة إلكترونية</option>
            <option value="إلكترونيات">إلكترونيات</option>
            <option value="أغذية ومشروبات">أغذية ومشروبات</option>
            <option value="ملابس وأزياء">ملابس وأزياء</option>
            <option value="أجهزة منزلية">أجهزة منزلية</option>
            <option value="خدمات">خدمات</option>
            <option value="أخرى">أخرى</option>
          </select>
        </div>
        <div>
          <label class="text-white/70 text-xs mb-1 block">البريد الإلكتروني *</label>
          <input id="regEmail" type="email" placeholder="admin@company.com" class="input-field w-full rounded-xl px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="text-white/70 text-xs mb-1 block">كلمة المرور *</label>
          <input id="regPass" type="password" placeholder="6 أحرف على الأقل" class="input-field w-full rounded-xl px-3 py-2.5 text-sm">
        </div>
        <select id="regPlan" class="input-field w-full rounded-xl px-3 py-2.5 text-sm">
          <option value="free">مجاني - 1000 تحليل/شهر</option>
          <option value="basic">أساسي - 10,000 تحليل/شهر</option>
          <option value="premium">متميز - 100,000 تحليل/شهر</option>
        </select>
        <div id="regError" class="hidden text-red-400 text-sm text-center py-2 bg-red-500/10 rounded-lg"></div>
        <button onclick="doRegister()" class="w-full bg-green-600 hover:bg-green-500 text-white rounded-xl py-3 font-bold transition">
          <i class="fas fa-user-plus ml-2"></i>إنشاء حساب
        </button>
      </div>
    </div>
  </div>

  <!-- Links -->
  <div class="text-center mt-5 text-white/50 text-sm">
    <a href="/" class="hover:text-white transition ml-4"><i class="fas fa-home ml-1"></i>الرئيسية</a>
    <a href="/api/docs" class="hover:text-white transition"><i class="fas fa-code ml-1"></i>API Docs</a>
  </div>
</div>

<script>
const API = '';

// Check if already logged in
if (localStorage.getItem('sa_token')) {
  window.location.href = '/dashboard';
}

function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('tab-active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('tab-active', tab === 'register');
  document.getElementById('tab-login').classList.toggle('text-white/70', tab !== 'login');
  document.getElementById('tab-register').classList.toggle('text-white/70', tab !== 'register');
}

function fillDemo(email, pass) {
  document.getElementById('loginEmail').value = email;
  document.getElementById('loginPass').value = pass;
  doLogin();
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showError('loginError', 'أدخل البريد وكلمة المرور'); return; }

  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i>جارٍ الدخول...';
  btn.disabled = true;

  try {
    const r = await fetch(API + '/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (!r.ok) {
      showError('loginError', d.detail || 'بيانات غير صحيحة');
      btn.innerHTML = '<i class="fas fa-sign-in-alt ml-2"></i>دخول';
      btn.disabled = false;
      return;
    }
    localStorage.setItem('sa_token', d.access_token);
    localStorage.setItem('sa_company', JSON.stringify(d.company));
    window.location.href = '/dashboard';
  } catch(e) {
    showError('loginError', 'خطأ في الاتصال بالخادم');
    btn.innerHTML = '<i class="fas fa-sign-in-alt ml-2"></i>دخول';
    btn.disabled = false;
  }
}

async function doRegister() {
  const data = {
    id: document.getElementById('regId').value.trim().toLowerCase(),
    name: document.getElementById('regName').value.trim(),
    industry: document.getElementById('regIndustry').value,
    email: document.getElementById('regEmail').value.trim(),
    password: document.getElementById('regPass').value,
    plan: document.getElementById('regPlan').value,
  };
  for (const [k, v] of Object.entries(data)) {
    if (!v) { showError('regError', 'جميع الحقول المطلوبة يجب تعبئتها'); return; }
  }
  if (!/^[a-z0-9_]+$/.test(data.id)) { showError('regError', 'معرف الشركة يجب أن يحتوي على أحرف إنجليزية صغيرة وأرقام وشرطة سفلية فقط'); return; }

  const r = await fetch(API + '/api/v1/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  const d = await r.json();
  if (!r.ok) { showError('regError', d.detail || 'خطأ في التسجيل'); return; }
  localStorage.setItem('sa_token', d.access_token);
  window.location.href = '/dashboard';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}
</script>
</body>
</html>
